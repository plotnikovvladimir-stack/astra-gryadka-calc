<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>АСТРА — калькулятор грядки</title>
<style>
  /* ШРИФТЫ (редактируемые): бренд-шрифты сайта идут первыми — на Tilda подхватятся из загруженных;
     если их нет (превью) — используется системный fallback. Чтобы сменить шрифт — правьте здесь. */
  :root{--green:#006D5E;--green-d:#00584a;--ink:#1A1A1A;--muted:#8A8A8A;--line:#E4E7E6;--surf:#F4F6F5;--soft:#ECF1F0;
    --font-head:'RF Dewi Expanded','RfDewiExpanded','Suisse Intl','Segoe UI',system-ui,sans-serif;
    --font-body:'Suisse Intl','SuisseIntl',-apple-system,'Segoe UI',Roboto,Arial,sans-serif;}
  *{box-sizing:border-box;}
  html{overflow-x:hidden;max-width:100%;}
  body{margin:0;font-family:var(--font-body);color:var(--ink);background:#fff;padding:20px;overflow-x:hidden;max-width:100%;}
  img{max-width:100%;}
  .card{display:grid;grid-template-columns:1.15fr 1fr;gap:30px;max-width:1120px;width:100%;margin:0 auto;align-items:start;}
  .card>*{min-width:0;}
  .stage{position:relative;border-radius:14px;height:460px;overflow:hidden;background:var(--surf);}
  .stage img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:opacity .35s ease;}
  .info{min-width:0;}
  .info h1{font-family:var(--font-head);font-size:23px;margin:0 0 10px;line-height:1.15;text-transform:uppercase;letter-spacing:.01em;font-weight:800;}
  .price-val{font-family:var(--font-head);font-size:34px;font-weight:800;color:var(--green);line-height:1;font-variant-numeric:tabular-nums;}
  .price-break{font-size:12.5px;color:var(--muted);margin:8px 0 18px;overflow-wrap:anywhere;}
  .lab{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:16px 0 8px;font-weight:600;}
  .opts{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px;}
  .sw{width:30px;height:30px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px var(--line);cursor:pointer;padding:0;justify-self:center;}
  .sw.on{box-shadow:0 0 0 2px var(--green);}
  .chip{border:1px solid var(--line);background:#fff;border-radius:9px;padding:10px 0;font-size:14px;cursor:pointer;font-variant-numeric:tabular-nums;text-align:center;}
  .chip:hover{border-color:var(--green);}
  .chip.on{background:var(--green);color:#fff;border-color:var(--green);}
  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:16px 0 6px;}
  .m{background:var(--surf);border-radius:10px;padding:12px 10px;text-align:center;}
  .m .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;}
  .m .v{font-family:var(--font-head);font-size:19px;font-weight:800;color:var(--ink);margin-top:4px;font-variant-numeric:tabular-nums;}
  .m.soil{background:#E7F1EC;} .m.soil .v{color:var(--green);}
  .aux{font-size:12px;color:var(--muted);margin:2px 0 0;}
  .hint{font-size:12px;color:var(--muted);margin:10px 0 0;line-height:1.5;}
  .cfg-link{display:inline-block;font-size:13px;color:var(--green);text-decoration:none;border-bottom:1px dashed var(--green);margin:12px 0 0;cursor:pointer;}
  .cfg-link:hover{color:var(--green-d);}
  .cart{width:100%;border:0;background:var(--green);color:#fff;font-size:16px;font-weight:600;padding:16px;border-radius:12px;cursor:pointer;transition:background .15s;margin-top:18px;}
  .cart:hover{background:var(--green-d);}
  .cart:active{transform:scale(.995);}
  .cart:focus-visible{outline:2px solid var(--green);outline-offset:2px;}
  @media(max-width:820px){
    body{padding:14px;}
    .card{grid-template-columns:1fr;gap:16px;}
    .stage{height:320px;}
    .info h1{font-size:20px;}
    .price-val{font-size:30px;}
    .opts{gap:5px;}
    .chip{padding:9px 0;font-size:13px;}
    .sw{width:26px;height:26px;}
    .metrics{grid-template-columns:repeat(2,1fr);}
    .aux{overflow-wrap:anywhere;}
  }
  @media(max-width:560px){
    .sws{grid-template-columns:repeat(5,1fr);}
    .sizes{grid-template-columns:repeat(4,1fr);}
    .sw{justify-self:start;}
  }
</style></head>
<body>
<div class="card">
  <div class="stage"><img id="imgA" alt="Грядка АСТРА"><img id="imgB" alt="" style="opacity:0"></div>
  <div class="info">
    <h1>Модульная грядка АСТРА</h1>
    <div class="price-val" id="pVal">—</div>
    <div class="price-break" id="pBreak">—</div>
    <div class="lab">Цвет</div>
    <div class="opts sws" id="sw"></div>
    <div class="lab">Размер</div>
    <div class="opts sizes" id="chips"></div>
    <div class="metrics">
      <div class="m"><div class="k">Длина</div><div class="v" id="mLen">—</div></div>
      <div class="m"><div class="k">Ширина</div><div class="v" id="mWid">—</div></div>
      <div class="m"><div class="k">Высота</div><div class="v" id="mHgt">—</div></div>
      <div class="m soil"><div class="k">Грунт ≈</div><div class="v" id="mSoil">—</div></div>
    </div>
    <div class="aux" id="aux">—</div>
    <p class="hint">Длина грядки не ограничена. Нужного размера нет в калькуляторе — <b>обратитесь к менеджеру компании</b>.</p>
    <a class="cfg-link" id="cfgLink">Другие конфигурации: Г, П, Н, Ш, цветник ↓</a>
    <button class="cart" id="cartBtn">Добавить в корзину</button>
  </div>
</div>

const IMAGES={}; ['brown','gray','beige','black','red'].forEach(k=>IMAGES[k]=SETS[k]||SETS.brown);
const COLORS=[
  {key:'brown',name:'Коричневый',sw:'#5E4630'},
  {key:'gray', name:'Серый',     sw:'#8C8C89'},
  {key:'beige',name:'Бежевый',   sw:'#C3B7A0'},
  {key:'black',name:'Чёрный',    sw:'#2A2724'},
  {key:'red',  name:'Красный',   sw:'#9B3D2E'}
];
const _p=new URLSearchParams(location.search);
let N=Math.max(1,Math.min(7,+_p.get('n')||1)), color=_p.get('c')||'brown', front=true;
const imgs=[document.getElementById('imgA'),document.getElementById('imgB')];
function fmt(x){return String(Math.round(x)).replace(/\B(?=(\d{3})+(?!\d))/g,' ');}
function colorName(){const c=COLORS.find(x=>x.key===color);return c?c.name:color;}
function spec(n){
  const big=Math.floor((n+1)/2), sh=(n%2===0)?1:0;
  const sum=big*CFG.secLong+sh*CFG.secShort;
  return {n900:big+1, n485:sh,
    lenExt:sum+CFG.wallGap, widExt:CFG.bedWidth+CFG.wallGap,
    lenInt:sum-CFG.wallGap, widInt:CFG.bedWidth-CFG.wallGap};
}
function units(){const k=(color==='beige')?CFG.beigeMarkup:1;return {u900:Math.round(CFG.priceModule900*k),u485:Math.round(CFG.priceModule485*k)};}
function order(){
  const sp=spec(N), u=units();
  const price=sp.n900*u.u900+sp.n485*u.u485;
  let parts=['модули 900 мм — '+sp.n900+' шт × '+fmt(u.u900)+CFG.currency];
  if(sp.n485) parts.push('модули 485 мм — '+sp.n485+' шт × '+fmt(u.u485)+CFG.currency);
  let breakText=parts.join('; ');
  if(color==='beige') breakText+='; бежевый +15%';
  return {sp,u,price,breakText};
}
function update(){
  const set=IMAGES[color]||SETS.brown;
  const cur=front?imgs[0]:imgs[1], nxt=front?imgs[1]:imgs[0];
  nxt.src=set[N-1]; nxt.style.opacity=1; cur.style.opacity=0; front=!front;
  const o=order(), sp=o.sp;
  const soilL=(sp.lenInt/1000)*(sp.widInt/1000)*(CFG.soilDepth/1000)*1000;
  const areaM=(sp.lenExt/1000)*(sp.widExt/1000);
  document.getElementById('pVal').textContent=fmt(o.price)+CFG.currency;
  document.getElementById('pBreak').textContent=o.breakText;
  document.getElementById('mLen').textContent=(Math.round(sp.lenExt/10)/100).toFixed(2)+' м';
  document.getElementById('mWid').textContent=(Math.round(sp.widExt/10)/100).toFixed(2)+' м';
  document.getElementById('mHgt').textContent=(Math.round(CFG.bedHeight/10)/100).toFixed(2)+' м';
  document.getElementById('mSoil').textContent=Math.round(soilL)+' л';
  document.getElementById('aux').textContent='Площадь посадки — '+areaM.toFixed(2)+' м²';
  document.querySelectorAll('#chips .chip').forEach(el=>el.classList.toggle('on',+el.dataset.n===N));
  document.querySelectorAll('#sw .sw').forEach(el=>el.classList.toggle('on',el.dataset.c===color));
}
function addToCart(){
  const o=order(), sp=o.sp;
  const name='Грядка АСТРА — '+colorName()+', '+sp.lenExt+'×'+sp.widExt+'×'+CFG.bedHeight+' мм';
  const img=(IMAGES[color]||SETS.brown)[N-1];
  if(typeof window.tcart__addProduct==='function'){
    window.tcart__addProduct({
      id:'astra-'+color+'-'+N, name:name, price:o.price, quantity:1, img:img, url:location.href,
      option:[{option:'Цвет',variant:colorName()},{option:'Размер',variant:sp.lenExt+'×'+sp.widExt+'×'+CFG.bedHeight+' мм'},{option:'Состав',variant:o.breakText}],
      descr:o.breakText
    });
    if(window.tcart__reDrawProducts) window.tcart__reDrawProducts();
    if(window.tcart__openWindow) window.tcart__openWindow();
  } else { alert('Заказ (демо, вне Tilda):\n'+name+'\nЦена: '+fmt(o.price)+CFG.currency+'\nСостав: '+o.breakText); }
}
const chips=document.getElementById('chips');
for(let k=1;k<=7;k++){const b=document.createElement('button');b.className='chip';b.dataset.n=k;b.textContent=k;b.onclick=()=>{N=k;update();};chips.appendChild(b);}
const sw=document.getElementById('sw');
COLORS.forEach(c=>{const b=document.createElement('button');b.className='sw';b.dataset.c=c.key;b.style.background=c.sw;b.title=c.name;b.setAttribute('aria-label',c.name);b.onclick=()=>{color=c.key;update();};sw.appendChild(b);});
document.getElementById('cartBtn').onclick=addToCart;
document.getElementById('cfgLink').onclick=function(){const t=document.querySelector(CFG.configAnchor);if(t)t.scrollIntoView({behavior:'smooth'});else location.hash=CFG.configAnchor;};
imgs[0].src=(IMAGES.brown)[0]; update();
</script>
</body></html>
